<?xml version="1.0" encoding="UTF-8"?>
<!-- All-blue text wordmark for UC Berkeley, used as a poster identifier.
     Not the official Cal logo — just a typographic monogram in
     Berkeley Blue (#003262). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110"
     font-family="Georgia, 'Times New Roman', serif">

  <!-- "Berkeley" wordmark -->
  <text x="160" y="60" text-anchor="middle"
        font-size="56" font-weight="700"
        fill="#003262" letter-spacing="-1">
    Berkeley
  </text>

  <!-- thin underline -->
  <line x1="40" y1="72" x2="280" y2="72"
        stroke="#003262" stroke-width="2"/>

  <!-- "UNIVERSITY OF CALIFORNIA" tag line -->
  <text x="160" y="95" text-anchor="middle"
        font-size="15" font-weight="500"
        fill="#003262" letter-spacing="3"
        font-family="Helvetica, Arial, sans-serif">
    UNIVERSITY OF CALIFORNIA
  </text>
</svg>
